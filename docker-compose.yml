# Local analytics stack: ClickHouse (analytical database) + Apache Superset (BI layer).
# Every configuration choice here is explained in docs/SETUP.md.

x-superset-env: &superset-env
  SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-dev_only_change_me_in_env_file}
  SUPERSET_METADATA_DB_URI: postgresql+psycopg2://superset:${POSTGRES_PASSWORD:-superset_metadata_local}@superset-metadata-db:5432/superset
  SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
  SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin_local}

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: payments-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: payments
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-analytics_local}
    ports:
      - "8123:8123"   # HTTP interface: Superset driver and the Python load script
      - "9000:9000"   # native TCP interface: clickhouse-client for ad hoc queries
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # Schema DDL, applied automatically on first start (empty data volume).
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
      # Backup destination (docs/OPERATIONS.md). Single-file mount so the
      # image's own config.d entries stay untouched.
      - ./clickhouse/config.d/backups.xml:/etc/clickhouse-server/config.d/backups.xml:ro
      - clickhouse_backups:/backups
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Continuous event stream: generates payment events against the seeded
  # merchant book and batch-inserts them into payments.events. Runs forever.
  producer:
    build: ./producer
    container_name: payments-producer
    restart: unless-stopped
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-analytics_local}
      EVENTS_PER_SECOND: ${EVENTS_PER_SECOND:-25}
      FLUSH_INTERVAL_SECONDS: ${FLUSH_INTERVAL_SECONDS:-5}
      ANOMALY_EVERY_MINUTES: ${ANOMALY_EVERY_MINUTES:-15}
      ANOMALY_DURATION_MINUTES: ${ANOMALY_DURATION_MINUTES:-7}
    depends_on:
      clickhouse:
        condition: service_healthy
    # The producer touches /tmp/heartbeat after every successful flush, so
    # "no committed insert for 30s" flips the container unhealthy even while
    # the Python process is still alive and retrying.
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time, sys; sys.exit(0 if time.time() - os.path.getmtime('/tmp/heartbeat') < 30 else 1)"]
      interval: 10s
      timeout: 3s
      start_period: 45s
      retries: 3

  superset-metadata-db:
    image: postgres:15-alpine
    container_name: superset-metadata-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-superset_metadata_local}
    # No host port mapping on purpose: only Superset needs this database,
    # and it reaches it over the Compose network by service name.
    volumes:
      - superset_metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot bootstrap: migrates the metadata schema, creates the admin user,
  # seeds default roles and permissions, then exits. Safe to re-run.
  superset-init:
    build: ./superset
    container_name: superset-init
    environment: *superset-env
    depends_on:
      superset-metadata-db:
        condition: service_healthy
    volumes:
      - superset_home:/app/superset_home
    command: >
      bash -c "superset db upgrade &&
      (superset fab create-admin
      --username \"$$SUPERSET_ADMIN_USERNAME\"
      --password \"$$SUPERSET_ADMIN_PASSWORD\"
      --firstname Admin --lastname User --email admin@localhost || true) &&
      superset init"

  superset:
    build: ./superset
    container_name: payments-superset
    restart: unless-stopped
    environment: *superset-env
    ports:
      - "8088:8088"   # Superset web UI and REST API
    depends_on:
      superset-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    volumes:
      - superset_home:/app/superset_home
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  clickhouse_data:
  clickhouse_backups:
  superset_metadata:
  superset_home:
